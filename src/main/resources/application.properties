spring.application.name=wc-winner

spring.datasource.url=jdbc:postgresql://localhost:5432/wc-predict
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.main.lazy-initialization=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=true

api-football.base-url=https://v3.football.api-sports.io
api-football.key=${API_FOOTBALL_KEY}
api-football.world-cup.league-id=1
api-football.world-cup.season=2026

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=1800000
